<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup Living Canvas — Integrated Viewport</title>
  <style>
    /* Reset & Deep Dark Continuous Space */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0c0e12;
      color: #f3f4f6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
      padding: 24px;
    }

    /* The Outer Surface Centering Engine */
    .artwork-surface {
      flex: 1;
      width: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    /* Clean, fluid containment for portrait artwork */
    .canvas-viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 380 / 594;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;

      /* Prevent portrait art from running off the bottom of the screen */
      max-height: 85vh;
      /* Calculate the maximum width allowed based on that max height */
      max-width: calc(85vh * (380 / 594));
    }

    /* Dedicated SVG Vector Mount Plane */
    #svg-holder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #svg-holder svg {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Ensures the vector never scales past wrapper edges */
    }

    /* Hardware-Accelerated State Interpolation (150ms Dynamic Fade) */
    .canvas-viewport svg * {
      transition: fill 150ms ease-in-out, stroke 150ms ease-in-out, opacity 150ms ease-in-out;
      will-change: fill, opacity;
    }

    /* Integrated Top-Left Cycle Trigger (Inside the Image Corner) */
    .canvas-control-top-left {
      position: absolute;
      top: 16px;
      left: 16px;
      background: transparent;
      border: none;
      color: rgba(243, 244, 246, 0.4);
      font-size: 1.5rem;
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: color 0.2s, background-color 0.2s;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
    }

    .canvas-control-top-left:hover {
      color: rgba(243, 244, 246, 1);
      background: rgba(255, 255, 255, 0.05);
    }

    /* Pure Floating HUD Bottom Left (Inside the Image Corner) */
    .canvas-hud-left {
      position: absolute;
      bottom: 16px;
      left: 16px;
      font-family: monospace;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
    }

    .hud-line-title {
      color: rgba(243, 244, 246, 0.9);
      font-weight: 700;
    }

    .hud-line-detail {
      color: rgba(243, 244, 246, 0.4);
    }

    /* Pure Floating HUD Bottom Right (Inside the Image Corner) */
    .canvas-hud-right {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      opacity: 0.7;
      transition: opacity 0.2s;
      z-index: 10;
    }

    .canvas-hud-right:hover {
      opacity: 1;
    }

    .flag-code {
      font-family: monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #ffffff;
    }

    #hud-flag-emoji {
      font-size: 1.2rem;
      line-height: 1;
    }

    /* Loading Sequence styling inside the viewport frame */
    .loading-state {
      font-family: monospace;
      font-size: 0.8rem;
      color: rgba(243, 244, 246, 0.4);
      letter-spacing: 0.05em;
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* Mobile Adaptations */
    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .canvas-hud-left,
      .canvas-hud-right {
        bottom: 12px;
        font-size: 0.65rem;
      }

      .canvas-hud-left { left: 12px; }
      .canvas-hud-right { right: 12px; gap: 6px; }
      .canvas-control-top-left { top: 12px; left: 12px; font-size: 1.25rem; }
      #hud-flag-emoji { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="artwork-surface" id="canvas-surface">

    <div class="canvas-viewport">

      <button class="canvas-control-top-left" id="btn-cycle-layer" title="Cycle Layers" style="display: none;">⟳</button>

      <div id="svg-holder">
        <p class="loading-state">Syncing Arweave Core...</p>
      </div>

      <div class="canvas-hud-left">
        <span class="hud-line-title" id="hud-status-title">TOURNAMENT LIVE</span>
        <span class="hud-line-detail" id="hud-status-detail">Syncing State...</span>
      </div>

      <div class="canvas-hud-right" id="hud-identity-trigger" title="Click to Force Sync State">
        <span class="flag-code" id="hud-flag-code">INIT</span>
        <span id="hud-flag-emoji">🌐</span>
      </div>

    </div>
  </div>

  <script>
    const ARDRIVE_SVG_URL = "https://jndhfcsxb26weaa2hxkeu3yymhe5oedcpcwnnqpjrhzafdcyp4aa.turbo-gateway.com/S0ZyilcOvWIAGj3USm8YYcnXEGJ4rNbB6YnyAoxYfwA?";
    const GITHUB_STATE_URL = "https://raw.githubusercontent.com/kutawala/worldcup/refs/heads/main/state.json";

    const tournamentTeams = {
      "CA": { name: "Canada", colors: ["#ff0000", "#ffffff"] },
      "CH": { name: "Switzerland", colors: ["#da291c", "#ffffff"] },
      "AT": { name: "Austria", colors: ["#ef3340", "#ffffff"] },
      "US": { name: "United States", colors: ["#1b365d", "#ffffff", "#aa1e2b"] },
      "FR": { name: "France", colors: ["#002395", "#ffffff", "#ed2939"] },
      "NL": { name: "Netherlands", colors: ["#ff4f00", "#ffffff", "#21468b"] },
      "AR": { name: "Argentina", colors: ["#74acdf", "#ffffff", "#f6b40e"] },
      "CO": { name: "Colombia", colors: ["#fcd116", "#0038a8", "#ce1126"] },
      "BE": { name: "Belgium", colors: ["#000000", "#ffd900", "#ee2436"] },
      "IT": { name: "Italy", colors: ["#008c45", "#f4f5f0", "#cd212a"] },
      "DE": { name: "Germany", colors: ["#000000", "#dd0000", "#ffce00"] },
      "MX": { name: "Mexico", colors: ["#006847", "#ffffff", "#ce1126", "#111111"] },
      "BR": { name: "Brazil", colors: ["#fde047", "#16a34a", "#2563eb", "#ffffff"] },
      "GB": { name: "England", colors: ["#ffffff", "#ce1126", "#002040", "#b3b3b3"] },
      "MA": { name: "Morocco", colors: ["#c1272d", "#006233", "#ffd700", "#ffffff"] },
      "PT": { name: "Portugal", colors: ["#046a38", "#ff0000", "#f1c40f", "#ffffff"] },
      "HR": { name: "Croatia", colors: ["#ff0000", "#ffffff", "#171796", "#999999"] },
      "NO": { name: "Norway", colors: ["#ba0c2f", "#00205b", "#ffffff", "#111111"] },
      "PY": { name: "Paraguay", colors: ["#d52b1e", "#0038a8", "#ffffff", "#222222"] },
      "AU": { name: "Australia", colors: ["#000031", "#ffcd00", "#008751", "#ffffff"] },
      "DZ": { name: "Algeria", colors: ["#008751", "#ffffff", "#d21034", "#222222"] },
      "CV": { name: "Cape Verde", colors: ["#0038a8", "#ffffff", "#d21034", "#fcd116"] },
      "ES": { name: "Spain", colors: ["#c60b1e", "#ffc400", "#002b7f", "#ffffff"] }
    };

    function shuffleColorArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function getFlagEmoji(countryCode) {
      const codePoints = countryCode
        .toUpperCase()
        .split('')
        .map(char => 127397 + char.charCodeAt(0));
      return String.fromCodePoint(...codePoints);
    }

    function applyTeamKit(surfaceElement, rawColorArray, freezeAura = false, focusMode = 'all') {
      if (!surfaceElement || !rawColorArray || rawColorArray.length === 0) return;

      const randomizedColors = shuffleColorArray(rawColorArray);
      let aura, primary, secondary, accent, detail;

      if (focusMode === 'flames') {
        primary   = rawColorArray[0] || "#ffffff";
        secondary = rawColorArray[1] || rawColorArray[0] || "#222222";
        accent    = rawColorArray[2] || rawColorArray[0] || "#ececec";
        detail    = rawColorArray[3] || rawColorArray[1] || rawColorArray[0] || "#111111";
        aura      = randomizedColors[0] || "#ffffff";
      } else {
        aura      = freezeAura ? (rawColorArray[0] || "#ffffff") : (randomizedColors[0] || "#ffffff");
        primary   = randomizedColors[0] || "#ffffff";
        secondary = randomizedColors[1] || randomizedColors[0] || "#222222";
        accent    = randomizedColors[2] || randomizedColors[0] || "#ececec";
        detail    = randomizedColors[3] || randomizedColors[1] || randomizedColors[0] || "#111111";
      }

      // Root updates cascading instantly down through the child vector paths
      surfaceElement.style.setProperty('--kit-aura',      aura);
      surfaceElement.style.setProperty('--kit-primary',   primary);
      surfaceElement.style.setProperty('--kit-secondary', secondary);
      surfaceElement.style.setProperty('--kit-accent',    accent);
      surfaceElement.style.setProperty('--kit-detail',    detail);
    }

    class TournamentSimulation {
      constructor(surfaceId, titleId, detailId, codeId, emojiId, cycleId) {
        this.surface = document.getElementById(surfaceId);
        this.statusTitle = document.getElementById(titleId);
        this.statusDetail = document.getElementById(detailId);
        this.nameOverlay = document.getElementById(codeId);
        this.emojiOverlay = document.getElementById(emojiId);
        this.cycleButton = document.getElementById(cycleId);
        this.activeTeams = Object.keys(tournamentTeams);
        this.intervalId = null;
        this.flickerSpeed = 500;
        this.isSettled = false;
        this.winnerCode = null;
        this.focusMode = 'all';
      }

      start() {
        this.fetchRemoteState();
        setInterval(() => this.fetchRemoteState(), 30000);

        if (this.intervalId) return;

        this.intervalId = setInterval(() => {
          if (this.activeTeams.length === 0) return;

          if (!this.isSettled) {
            const randomCode = this.activeTeams[Math.floor(Math.random() * this.activeTeams.length)];
            this.winnerCode = randomCode;

            const teamData = tournamentTeams[randomCode];
            if (teamData) {
              this.nameOverlay.innerText = teamData.name;
              this.emojiOverlay.innerText = getFlagEmoji(randomCode);
              applyTeamKit(this.surface, teamData.colors, false, this.focusMode);
            }
          } else {
            const teamData = tournamentTeams[this.winnerCode];
            if (teamData) {
              applyTeamKit(this.surface, teamData.colors, true, this.focusMode);
            }
          }
        }, this.flickerSpeed);
      }

      async fetchRemoteState() {
        try {
          const res = await fetch(`${GITHUB_STATE_URL}?t=${Date.now()}`);
          if (!res.ok) return;
          const data = await res.json();

          if (Array.isArray(data.eliminated)) {
            this.activeTeams = Object.keys(tournamentTeams).filter(
              code => !data.eliminated.includes(code)
            );
          }

          if (data.winner && tournamentTeams[data.winner]) {
            this.settleTournament(data.winner);
          } else if (this.activeTeams.length === 1) {
            this.settleTournament(this.activeTeams[0]);
          } else {
            this.isSettled = false;
            this.statusTitle.innerText = "TOURNAMENT LIVE";
            this.statusDetail.innerText = `${this.activeTeams.length} Teams Remaining`;
          }
        } catch (err) {
          console.warn("GitHub dynamic sync offline, remaining static inside environment.", err);
        }
      }

      toggleFocusMode() {
        this.focusMode = this.focusMode === 'all' ? 'flames' : 'all';
        const activeCode = this.isSettled 
          ? this.winnerCode 
          : Object.keys(tournamentTeams).find(key => tournamentTeams[key].name === this.nameOverlay.innerText);

        if (activeCode && tournamentTeams[activeCode]) {
          applyTeamKit(this.surface, tournamentTeams[activeCode].colors, this.isSettled, this.focusMode);
        }
      }

      settleTournament(forcedWinnerCode = null) {
        this.isSettled = true;
        this.winnerCode = forcedWinnerCode || this.activeTeams[0];
        const teamData = tournamentTeams[this.winnerCode];

        if (teamData) {
          this.nameOverlay.innerText = teamData.name;
          this.emojiOverlay.innerText = getFlagEmoji(this.winnerCode);
          this.statusTitle.innerText = "🏆 CHAMPION DECLARED";
          this.statusDetail.innerText = `${teamData.name} Wins`;
          if (this.cycleButton) this.cycleButton.style.display = 'flex';
        }
      }
    }

    // 🚀 THE ASYNC INJECTION MOUNT PLANE
    async function initApp() {
      const holder = document.getElementById('svg-holder');
      try {
        // 1. Fetch raw SVG string across Arweave decentralized rails
        const response = await fetch(ARDRIVE_SVG_URL);
        if (!response.ok) throw new Error(`Gateway Error Status: ${response.status}`);
        const svgText = await response.text();
        
        // 2. Mount code layout natively inside safe vector window wrapper
        holder.innerHTML = svgText;

        // 3. Fire engine loop *ONLY AFTER* paths have safely settled in DOM tree
        const sim = new TournamentSimulation(
          'canvas-surface',
          'hud-status-title',
          'hud-status-detail',
          'hud-flag-code',
          'hud-flag-emoji',
          'btn-cycle-layer'
        );
        sim.start();

        // 4. Connect UI interactions securely
        document.getElementById('hud-identity-trigger').addEventListener('click', () => sim.fetchRemoteState());
        document.getElementById('btn-cycle-layer').addEventListener('click', () => sim.toggleFocusMode());

      } catch (err) {
        console.error("Arweave Fetch Engine Core Crash:", err);
        holder.innerHTML = `<p style="color:#ef4444; font-family:monospace; font-size:0.75rem; text-align:center;">Network Error Connecting to Arweave.</p>`;
      }
    }

    // Fire App Setup
    document.addEventListener("DOMContentLoaded", initApp);
  </script>
</body>
</html>
